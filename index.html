<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GENDA Americas — Employee Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; min-height: 100vh; color: #1a1a2e; }
    .topbar { background: #1a1a2e; padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-logo { font-size: 14px; font-weight: 600; color: #fff; letter-spacing: .04em; }
    .topbar-logo span { color: #4db8ff; }
    .topbar-user { display: none; align-items: center; gap: 10px; }
    .topbar-user.visible { display: flex; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #0078d4; color: #fff; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
    .user-name { font-size: 13px; color: #ccc; }
    .sign-out { font-size: 12px; color: #aaa; background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: background .15s; }
    .sign-out:hover { background: rgba(255,255,255,.1); color: #fff; }
    .main { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
    #login-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; }
    .login-card { background: #fff; border: 0.5px solid #e2e6ea; border-radius: 16px; padding: 56px 48px; max-width: 420px; width: 100%; }
    .login-card .welcome { font-size: 13px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
    .login-card h1 { font-size: 24px; font-weight: 600; color: #1a1a2e; margin-bottom: 10px; }
    .login-card p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 32px; }
    .ms-btn { display: inline-flex; align-items: center; gap: 12px; background: #0078d4; color: #fff; border: none; border-radius: 6px; padding: 13px 24px; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; justify-content: center; transition: background .15s; }
    .ms-btn:hover { background: #106ebe; }
    .ms-btn:disabled { background: #a8d0ef; cursor: not-allowed; }
    .login-status { margin-top: 16px; font-size: 13px; color: #666; min-height: 18px; }
    .login-error { color: #a32d2d; font-size: 13px; margin-top: 12px; background: #fff0f0; border: 1px solid #f5c0c0; border-radius: 6px; padding: 10px 14px; display: none; text-align: left; line-height: 1.5; }
    #portal-state { display: none; }
    .profile-bar { background: #fff; border: 0.5px solid #e2e6ea; border-radius: 12px; padding: 20px 24px; margin-bottom: 32px; display: flex; align-items: center; gap: 16px; }
    .profile-avatar { width: 48px; height: 48px; border-radius: 50%; background: #0078d4; color: #fff; font-size: 18px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .profile-info { flex: 1; }
    .profile-name { font-size: 17px; font-weight: 600; color: #1a1a2e; margin-bottom: 2px; }
    .profile-meta { font-size: 13px; color: #888; }
    .profile-dept { background: #e8f3fc; color: #1a4a7a; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
    .portal-section-title { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 16px; }
    .forms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .form-card { background: #fff; border: 0.5px solid #e2e6ea; border-radius: 12px; padding: 24px; cursor: pointer; transition: all .15s; text-decoration: none; display: block; position: relative; overflow: hidden; }
    .form-card:hover { border-color: #0078d4; box-shadow: 0 4px 16px rgba(0,120,212,.1); transform: translateY(-2px); }
    .form-card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 12px 12px 0 0; }
    .form-card-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 14px; }
    .form-card-title { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    .form-card-desc { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 16px; }
    .form-card-footer { display: flex; align-items: center; justify-content: space-between; }
    .form-card-tag { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 10px; }
    .form-card-arrow { font-size: 16px; color: #aaa; }
    .form-card:hover .form-card-arrow { color: #0078d4; }
    .policy-links { background: #fff; border: 0.5px solid #e2e6ea; border-radius: 12px; padding: 20px 24px; }
    .policy-link { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid #f4f4f4; text-decoration: none; color: #333; font-size: 14px; transition: color .15s; }
    .policy-link:last-child { border-bottom: none; }
    .policy-link:hover { color: #0078d4; }
    .policy-link-icon { font-size: 18px; width: 24px; text-align: center; }
    .policy-link-arrow { margin-left: auto; font-size: 14px; color: #aaa; }
    .footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 40px; padding-top: 20px; border-top: 1px solid #e8eaed; line-height: 1.7; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">GENDA <span>Americas</span></div>
  <div class="topbar-user" id="topbar-user">
    <div class="user-avatar" id="topbar-avatar"></div>
    <div class="user-name" id="topbar-name"></div>
    <button class="sign-out" onclick="signOut()">Sign out</button>
  </div>
</div>
<div class="main">
  <div id="login-state">
    <div class="login-card">
      <div class="welcome">GENDA Americas</div>
      <h1>Employee Portal</h1>
      <p>Sign in with your GENDA Microsoft account to access forms, submit requests, and view company policies.</p>
      <button class="ms-btn" id="ms-btn" onclick="startLogin()">
        <svg width="20" height="20" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="1"  y="1"  width="9" height="9" fill="#f25022"/>
          <rect x="11" y="1"  width="9" height="9" fill="#7fba00"/>
          <rect x="1"  y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Sign in with Microsoft
      </button>
      <div class="login-status" id="login-status">Use your GENDA work account.</div>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>
  <div id="portal-state">
    <div class="profile-bar">
      <div class="profile-avatar" id="profile-avatar"></div>
      <div class="profile-info">
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-meta" id="profile-meta"></div>
      </div>
      <div class="profile-dept" id="profile-dept"></div>
    </div>
    <div class="portal-section-title">Submit a request</div>
    <div class="forms-grid" id="forms-grid"></div>
    <div class="portal-section-title">Company policies</div>
    <div class="policy-links" id="policy-links"></div>
    <div class="footer">
      GENDA Americas Employee Portal · Questions? Contact
      <a href="mailto:finance@genda-americas.com" style="color:#0078d4">finance@genda-americas.com</a>
    </div>
  </div>
</div>
<script>
const CONFIG = {
  CLIENT_ID:    "3f026079-4216-4110-b041-6355f230aeff",
  TENANT_ID:    "85103847-332a-40be-93be-9f6e3b395308",
  REDIRECT_URI: "https://orange-flower-06cdcc30f.7.azurestaticapps.net/callback",
  forms: [
        {
      id:           "te-approval-v2",
      title:        "T&E Pre-Approval (New)",
      description:  "New Power Automate connected T&E pre-approval request form.",
      icon:         "✈️",
      color:        "#7719aa",
      bgColor:      "#f5e6ff",
      tag:          "Finance",
      tagColor:     "#f5e6ff",
      tagTextColor: "#7719aa",
      zohoFormUrl:  "https://forms.zohopublic.ca/gendaamericas1/form/TEPreapprovalRequestPA/formperma/Oc_w4HpsKjgDWkjwatck31W05bqxK3zwAVSHL9x7KnY",
      prefillFields: {
        "Name_First":  "firstName",
        "Name_Last":   "lastName",
        "Email":       "email",
        "Dropdown":    "department",
        "SingleLine": "jobTitle"
      }
    },
    {
      id:           "purchase-preapproval-v1",
      title:        "Purchase Pre-Approval",
      description:  "Purchasing pre-approval request for vendor commitments, equipment, and lease agreements.",
      icon:         "🧾",
      color:        "#c2410c",
      bgColor:      "#fff1e6",
      tag:          "Purchasing",
      tagColor:     "#fff1e6",
      tagTextColor: "#c2410c",
      zohoFormUrl:  "https://forms.genda-americas.com/gendaamericas1/form/Purchasepreapproval/formperma/0uOQiu1PonUjOCh3x5iPolKNUwU6hI7BL7deDrRG98Y",
      prefillFields: {
        "Name_First":  "firstName",
        "Name_Last":   "lastName",
        "Email":       "email",
        "Dropdown":    "department",
        "SingleLine": "jobTitle"
      }
    }
  ],
  policies: [
    {
      title:       "Travel & Expense Policy",
      description: "Full T&E policy including approval thresholds, meal caps, and reimbursement rules.",
      icon:        "📋",
      url:         "https://tandeapprovals.zohosites.ca/policy"
    },
    {
      title:       "Purchasing Pre-Approval Policy",
      description: "Approval authority matrix, PO requirements, and purchasing exceptions following Business Central implementation.",
      icon:        "📦",
      url:         "http://tandeapprovals.zohosites.ca/purchase-pre-approval-policy"
    }
  ]
};
const AUTHORITY = "https://login.microsoftonline.com/" + CONFIG.TENANT_ID;
const SCOPES    = "openid profile email User.Read";
const STORE_KEY = "genda_portal_profile";
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}
async function pkce() {
  const verifier  = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const hash      = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  const challenge = b64url(hash);
  return { verifier, challenge };
}
async function startLogin() {
  document.getElementById("ms-btn").disabled = true;
  document.getElementById("login-status").textContent = "Connecting to Microsoft...";
  document.getElementById("login-error").style.display = "none";
  const { verifier, challenge } = await pkce();
  const state = b64url(crypto.getRandomValues(new Uint8Array(16)));
  localStorage.setItem("pkce_v",      verifier);
  localStorage.setItem("oauth_state", state);
  const params = new URLSearchParams({
    client_id:             CONFIG.CLIENT_ID,
    response_type:         "code",
    redirect_uri:          CONFIG.REDIRECT_URI,
    response_mode:         "fragment",
    scope:                 SCOPES,
    state:                 state,
    code_challenge:        challenge,
    code_challenge_method: "S256",
    prompt:                "select_account"
  });
  window.location.href = AUTHORITY + "/oauth2/v2.0/authorize?" + params;
}
async function handleCallback() {
  const cached = localStorage.getItem(STORE_KEY);
  const callbackParams = localStorage.getItem("oauth_callback_params");
  const paramString = callbackParams || window.location.search;
  const p     = new URLSearchParams(paramString);
  const code  = p.get("code");
  const state = p.get("state");
  const err   = p.get("error");
  if (callbackParams) localStorage.removeItem("oauth_callback_params");
  if (cached && !code) { showPortal(JSON.parse(cached)); return; }
  if (err) { showLoginError("Microsoft login failed: " + (p.get("error_description") || err)); return; }
  if (!code) return;
  const verifier   = localStorage.getItem("pkce_v");
  const savedState = localStorage.getItem("oauth_state");
  if (!verifier)            { showLoginError("Session expired. Please try again."); return; }
  if (state !== savedState) { showLoginError("Security check failed. Please try again."); return; }
  document.getElementById("login-status").textContent = "Signing you in...";
  const tokenResp = await fetch(AUTHORITY + "/oauth2/v2.0/token", {
    method:  "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body:    new URLSearchParams({
      client_id:     CONFIG.CLIENT_ID,
      grant_type:    "authorization_code",
      code:          code,
      redirect_uri:  CONFIG.REDIRECT_URI,
      code_verifier: verifier,
      scope:         SCOPES
    })
  });
  const tokens = await tokenResp.json();
  if (tokens.error) { showLoginError("Token error: " + (tokens.error_description || tokens.error)); return; }
  document.getElementById("login-status").textContent = "Loading your profile...";
  const profileResp = await fetch(
    "https://graph.microsoft.com/v1.0/me?$select=id,displayName,givenName,surname,mail,userPrincipalName,department,jobTitle",
    { headers: { Authorization: "Bearer " + tokens.access_token } }
  );
  const u = await profileResp.json();
  if (u.error) { showLoginError("Could not load profile: " + u.error.message); return; }
  window.history.replaceState({}, document.title, window.location.pathname);
  localStorage.removeItem("pkce_v");
  localStorage.removeItem("oauth_state");
  localStorage.setItem(STORE_KEY, JSON.stringify(u));
  showPortal(u);
}
function showPortal(u) {
  const firstName = u.givenName   || (u.displayName || "").split(" ")[0] || "";
  const lastName  = u.surname     || (u.displayName || "").split(" ").slice(1).join(" ") || "";
  const email     = u.mail        || u.userPrincipalName || "";
  const dept      = u.department  || "";
  const title     = u.jobTitle    || "";
  const initials  = ((firstName[0] || "") + (lastName[0] || "")).toUpperCase();
  window._profile = { firstName, lastName, email, dept, title, id: u.id };
  document.getElementById("topbar-avatar").textContent = initials;
  document.getElementById("topbar-name").textContent   = firstName;
  document.getElementById("topbar-user").classList.add("visible");
  document.getElementById("profile-avatar").textContent = initials;
  document.getElementById("profile-name").textContent   = u.displayName || (firstName + " " + lastName);
  document.getElementById("profile-meta").textContent   = (title ? title + " · " : "") + email;
  document.getElementById("profile-dept").textContent   = dept || "Department not set in Azure AD";
  const grid = document.getElementById("forms-grid");
  CONFIG.forms.forEach(form => {
    const card = document.createElement("a");
    card.href      = buildFormUrl(form);
    card.target    = "_blank";
    card.className = "form-card";
    card.innerHTML = `
      <div class="form-card-accent" style="background:${form.color}"></div>
      <div class="form-card-icon" style="background:${form.bgColor}">${form.icon}</div>
      <div class="form-card-title">${form.title}</div>
      <div class="form-card-desc">${form.description}</div>
      <div class="form-card-footer">
        <span class="form-card-tag" style="background:${form.tagColor};color:${form.tagTextColor}">${form.tag}</span>
        <span class="form-card-arrow">→</span>
      </div>`;
    grid.appendChild(card);
  });
  const policyContainer = document.getElementById("policy-links");
  CONFIG.policies.forEach(policy => {
    const link = document.createElement("a");
    link.href      = policy.url;
    link.target    = "_blank";
    link.className = "policy-link";
    link.innerHTML = `
      <span class="policy-link-icon">${policy.icon}</span>
      <div>
        <div style="font-weight:500;margin-bottom:2px">${policy.title}</div>
        <div style="font-size:12px;color:#888">${policy.description}</div>
      </div>
      <span class="policy-link-arrow">→</span>`;
    policyContainer.appendChild(link);
  });
  document.getElementById("login-state").style.display  = "none";
  document.getElementById("portal-state").style.display = "block";
}
function buildFormUrl(form) {
  const p = window._profile;
  const graphValues = {
    firstName:  p.firstName,
    lastName:   p.lastName,
    email:      p.email,
    department: p.dept,
    jobTitle:   p.title
  };
  const params = new URLSearchParams({ zf_prefill_live: "true" });
  Object.entries(form.prefillFields).forEach(([zohoParam, graphField]) => {
    params.set(zohoParam, graphValues[graphField] || "");
  });
  return form.zohoFormUrl + "?" + params.toString();
}
function signOut() {
  localStorage.removeItem(STORE_KEY);
  window.location.href = AUTHORITY + "/oauth2/v2.0/logout?post_logout_redirect_uri=" +
    encodeURIComponent("https://orange-flower-06cdcc30f.7.azurestaticapps.net/");
}
handleCallback();
</script>
</body>
</html>
