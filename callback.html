<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Signing you in...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .msg { text-align: center; color: #666; font-size: 15px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e2e6ea;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  Signing you in...
</div>
<script>
  // Microsoft redirects here with ?code= in the URL
  // Azure Static Web Apps passes query params to JS — no blocking
  // Redirect to the portal (index.html) on the same Azure domain
  // passing all the OAuth params along
  var params = window.location.search;
  if (params.includes("code=") || params.includes("error=")) {
    window.location.replace("https://orange-flower-06cdcc30f.7.azurestaticapps.net/" + params);
  } else {
    window.location.replace("https://orange-flower-06cdcc30f.7.azurestaticapps.net/");
  }
</script>
</body>
</html>
