<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Signing you in...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .msg { text-align: center; color: #666; font-size: 15px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e2e6ea;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  Signing you in...
</div>
<script>
  // Microsoft sends the OAuth code in the URL hash (#)
  // because we use response_mode=fragment
  // Zoho Sites never blocks hash parameters — only query params
  // We read the hash and redirect to the portal homepage with it as a query string
  var hash = window.location.hash;
  if (hash && hash.length > 1) {
    // Convert hash to query string and send to portal homepage
    window.location.replace("https://tandeapprovals.zohosites.ca/?" + hash.substring(1));
  } else {
    // No hash — just go home
    window.location.replace("https://tandeapprovals.zohosites.ca/");
  }
</script>
</body>
</html>
