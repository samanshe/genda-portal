<script>
  var params = window.location.search;
  var hash = window.location.hash;
  
  // Debug — store everything for inspection
  localStorage.setItem("debug_search", params);
  localStorage.setItem("debug_hash", hash);
  localStorage.setItem("debug_href", window.location.href);

  if (params.includes("code=")) {
    localStorage.setItem("oauth_callback_params", params);
    window.location.replace("https://orange-flower-06cdcc30f.7.azurestaticapps.net/");
  } else if (hash.includes("code=")) {
    // Microsoft might be sending code in hash instead
    localStorage.setItem("oauth_callback_params", "?" + hash.substring(1));
    window.location.replace("https://orange-flower-06cdcc30f.7.azurestaticapps.net/");
  } else {
    localStorage.setItem("oauth_callback_params", "NOCODE_params=" + params + "_hash=" + hash);
    window.location.replace("https://orange-flower-06cdcc30f.7.azurestaticapps.net/");
  }
</script>
